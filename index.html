<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dungeon Quest — 인터랙티브 자기소개</title>
    <meta name="description" content="여러 번 전직한 모험가의 인터랙티브 이력서" />
    <script>
      window.history.scrollRestoration = 'manual'
      window.scrollTo(0, 0)
      window.addEventListener('pageshow', function () {
        window.scrollTo(0, 0)
        setTimeout(function () {
          window.scrollTo(0, 0)
        }, 0)
        setTimeout(function () {
          window.scrollTo(0, 0)
        }, 250)
        setTimeout(function () {
          window.scrollTo(0, 0)
        }, 900)
      })
      window.addEventListener('beforeunload', function () {
        window.scrollTo(0, 0)
      })
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Noto+Sans+KR:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
